<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gelateria — Back office</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin">
  <header class="topbar">
    <div class="wrap">
      <h1>🍦 Back office</h1>
      <span class="sub" id="conn">●</span>
    </div>
  </header>

  <!-- LOGIN GATE -->
  <main class="wrap" id="gate-wrap">
    <div class="gate card">
      <h2>Accesso gestione</h2>
      <p class="muted small">Inserisci la password.</p>
      <div class="field"><input id="pw" type="password" placeholder="Password"></div>
      <button class="btn block" id="pw-go">Entra</button>
    </div>
  </main>

  <!-- APP -->
  <main class="wrap hidden" id="app">
    <div class="tabs">
      <button class="tab active" data-tab="orders">Ordini</button>
      <button class="tab" data-tab="flavors">Gusti</button>
      <button class="tab" data-tab="formats">Formati &amp; prezzi</button>
      <button class="tab" data-tab="slots">Fasce orarie</button>
      <button class="tab" data-tab="settings">Parametri</button>
    </div>

    <section id="tab-orders" class="tabpane">
      <div class="row between"><h2>Ordini in arrivo</h2><span class="tag" id="orders-count">0</span></div>
      <div id="orders-list" class="stack"></div>
    </section>

    <section id="tab-flavors" class="tabpane hidden">
      <h2>Gusti ordinabili</h2>
      <div class="card row">
        <input id="nf-name" placeholder="Nuovo gusto (es. Mango)" class="grow">
        <button class="btn sm" id="nf-add" style="margin-left:8px">Aggiungi</button>
      </div>
      <div id="flavors-list" class="stack"></div>
    </section>

    <section id="tab-formats" class="tabpane hidden">
      <h2>Formati &amp; prezzi</h2>
      <div class="card stack">
        <div class="row"><input id="nfo-name" placeholder="Nome (es. Vaschetta 1kg)" class="grow"></div>
        <div class="row" style="gap:8px">
          <div class="grow"><label>N. gusti max</label><input id="nfo-max" type="number" min="1" value="1"></div>
          <div class="grow"><label>Prezzo €</label><input id="nfo-price" type="number" min="0" step="0.50" value="0"></div>
        </div>
        <button class="btn sm" id="nfo-add">Aggiungi formato</button>
      </div>
      <div id="formats-list" class="stack"></div>
    </section>

    <section id="tab-slots" class="tabpane hidden">
      <h2>Fasce orarie</h2>
      <div class="card row">
        <input id="ns-label" placeholder="Nuova fascia (es. 20:00 - 20:30)" class="grow">
        <button class="btn sm" id="ns-add" style="margin-left:8px">Aggiungi</button>
      </div>
      <div id="slots-list" class="stack"></div>
    </section>

    <section id="tab-settings" class="tabpane hidden">
      <h2>Parametri di consegna</h2>
      <div class="card stack">
        <div class="field"><label>Costo di consegna €</label><input id="set-delivery" type="number" min="0" step="0.50"></div>
        <div class="field"><label>Ordine minimo €</label><input id="set-min" type="number" min="0" step="0.50"></div>
        <button class="btn" id="set-save">Salva parametri</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
