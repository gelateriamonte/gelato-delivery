# Sito statico: nessun build step, pubblica la root del repo.
[build]
  publish = "."
  command = ""

# Sottodominio admin: admin.gelateriamontepetrosu.it/ → /admin.html (rewrite SOLO della root).
# NON usare "/*": con force=true riscriverebbe anche /js/*, /css/*, /config.js → servirebbe
# HTML al posto degli asset, rompendo la pagina. Solo la root va forzata su admin.html;
# gli asset reali (file esistenti) passano normalmente.
[[redirects]]
  from = "https://admin.gelateriamontepetrosu.it/"
  to = "/admin.html"
  status = 200
  force = true

# ⚠️ Sicurezza: publish="." servirebbe pubblicamente OGNI file git-tracked. Questi redirect
# (force=true → vincono sul file statico esistente) bloccano i sorgenti NON-asset: schema e
# migration SQL, doc interni, file di build/config. Restano in git (storia) ma → 404 sul sito.
# Fix "vero" futuro = publish in una sottocartella con soli asset (vedi F-DEPLOY).
[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/SPEC.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/jsconfig.json"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/eslint.config.mjs"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true

# A ogni deploy di produzione: avvisa il titolare su Telegram ("nuova versione, ricarica").
[[plugins]]
  package = "./netlify/plugins/notify-telegram"

# Pagamenti: funzioni serverless (Stripe). Netlify installa le deps da package.json.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Pulizia bozze ordine non pagate (gira 1×/giorno sul deploy di produzione).
[functions."cleanup-pending"]
  schedule = "@daily"
