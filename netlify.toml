# Sito statico: nessun build step, pubblica la root del repo.
[build]
  publish = "."
  command = ""

# Pagamenti: funzioni serverless (Stripe). Netlify installa le deps da package.json.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Pulizia bozze ordine non pagate (gira 1×/giorno sul deploy di produzione).
[functions."cleanup-pending"]
  schedule = "@daily"
